name: AutoGPT Platform - Deploy Dev Environment

on:
  push:
    branches: [ dev ]
    paths:
      - 'autogpt_platform/**'

permissions:
  contents: read
  id-token: write

jobs:
  migrate:
    name: Run migrations for AutoGPT Platform
    runs-on: ubuntu-latest
    environment: develop

    # ❌ Skip bots (dependabot etc.)
    if: github.actor != 'dependabot[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Prisma CLI
        run: |
          python -m pip install --upgrade pip
          pip install prisma

      - name: Validate database secret
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "DATABASE_URL is not set. Skipping migrations."
            exit 0
          fi
        env:
          DATABASE_URL: ${{ secrets.BACKEND_DATABASE_URL }}

      - name: Run Backend Migrations
        working-directory: ./autogpt_platform/backend
        env:
          DATABASE_URL: ${{ secrets.BACKEND_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.BACKEND_DATABASE_URL }}
        run: |
          python -m prisma migrate deploy

  trigger:
    name: Trigger deploy workflow
    needs: migrate
    runs-on: ubuntu-latest

    # sirf tab jab migrate job actually run hui ho
    if: github.actor != 'dependabot[bot]'

    steps:
      - name: Trigger deploy workflow
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DEPLOY_TOKEN }}
          repository: Significant-Gravitas/AutoGPT_cloud_infrastructure
          event-type: build_deploy_dev
          client-payload: >
            {
              "ref": "${{ github.ref }}",
              "sha": "${{ github.sha }}",
              "repository": "${{ github.repository }}"
            }
